name: Python & Docker CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    # Step 1: Check out the repository code
    - name: Checkout code
      uses: actions/checkout@v4

    # Step 2: Set up Python environment
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11' # Change to your preferred Python version
        cache: 'pip'          # Speeds up subsequent runs if requirements.txt exists

    # Step 3: Install dependencies (Required for pytest and imports)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        pip install pytest # Ensures pytest is available if not in requirements.txt

    # Step 4: Syntax compilation check
    - name: Compile Python files
      run: python -m py_compile main.py ui.py app/*.py


    # Step 6: Set up Docker Buildx (Best practice for modern GitHub Actions)
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    # Step 7: Build the Docker image
    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        push: false # Set to true later if you want to push to a registry (e.g., DockerHub)
        tags: my-app:latest